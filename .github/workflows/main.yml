name: CI
# Modified by BW-Tech GmbH for owncloud.online (PHP 8.4).

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CORE_REPO: BWTECH-github/owncloud.online
  CORE_REF: main

jobs:
  lint-and-style:
    name: PHP ${{ matrix.php }} — Lint & Code Style
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-progress --no-interaction

      - name: Install owncloud-codestyle bin
        run: composer bin owncloud-codestyle install --no-progress --no-interaction

      - name: PHP syntax lint
        run: |
          set -e
          find appinfo lib templates tests -type f -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Run php-cs-fixer (dry-run)
        run: |
          vendor-bin/owncloud-codestyle/vendor/bin/php-cs-fixer fix \
            -v --diff --allow-risky=yes --dry-run

  integration:
    name: Install with owncloud.online core (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
    steps:
      - name: Checkout owncloud.online core
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPO }}
          ref: ${{ env.CORE_REF }}
          path: server

      - name: Checkout files_primary_s3 app into apps/
        uses: actions/checkout@v4
        with:
          path: server/apps/files_primary_s3

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          extensions: curl,gd,intl,json,mbstring,openssl,pdo_sqlite,xml,zip
          coverage: none

      - name: Composer cache (core)
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-core-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('server/composer.lock') }}
          restore-keys: composer-core-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install core dependencies
        working-directory: server
        run: composer install --no-progress --no-interaction --no-dev

      - name: Install app dependencies
        working-directory: server/apps/files_primary_s3
        run: composer install --no-progress --no-interaction --no-dev

      - name: Install ownCloud server (SQLite)
        working-directory: server
        run: |
          php occ maintenance:install \
            --database sqlite \
            --admin-user admin --admin-pass admin

      - name: Enable files_primary_s3 app
        working-directory: server
        run: php occ app:enable files_primary_s3

      - name: List enabled apps (smoke check)
        working-directory: server
        run: php occ app:list | grep -A1 'Enabled:' | head -20

      - name: Verify OCC commands are registered
        working-directory: server
        run: |
          php occ list s3 --raw | tee /tmp/s3-cmds.txt
          grep -q 's3:list' /tmp/s3-cmds.txt
          grep -q 's3:create-bucket' /tmp/s3-cmds.txt
